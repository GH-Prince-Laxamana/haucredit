; PHP Configuration for HAUCredit
; This file can be mounted into the container via docker-compose.yml

; Memory and Execution
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; File Upload Configuration
upload_max_filesize = 50M
post_max_size = 50M

; Error Reporting (adjust for production)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Session Configuration
session.gc_maxlifetime = 3600
session.cookie_httponly = 1
session.cookie_secure = 0
session.cookie_samesite = Lax

; OPcache (enabled via Dockerfile)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1

; MySQL/MySQLi
mysqli.max_links = -1
mysqli.max_persistent = -1
default_socket = /var/run/mysqld/mysqld.sock

; Date
date.timezone = UTC

; Security Headers (handled by Apache, but included here for reference)
; Ensure these are set in your Apache configuration:
; X-Content-Type-Options: nosniff
; X-Frame-Options: SAMEORIGIN
; Strict-Transport-Security: max-age=31536000; includeSubDomains
